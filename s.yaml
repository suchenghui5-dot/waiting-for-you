# s.yaml - 阿里云 Serverless 部署配置
edition: 1.0.0
name: waiting-for-you-app  # 随便起个应用名
access: default

services:
  web:
    component: fc
    props:
      region: cn-hangzhou
      serviceName: waiting-for-you-service
      functionName: web
      runtime: nodejs18
      codeUri: ./
      handler: index.handler
      memorySize: 128
      timeout: 30
      triggers:
        - type: http
          props:
            authType: anonymous
            methods:
              - GET
              - POST
