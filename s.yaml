edition: 1.0.0
name: waiting-for-you
access: default

services:
  website:
    component: fc
    props:
      region: cn-hangzhou
      service:
        name: waiting-for-you
      function:
        name: web
        runtime: nodejs16
        handler: index.handler
        memorySize: 128
        timeout: 30
      triggers:
        - type: http
          functionName: web
          props:
            authType: anonymous
            methods: [GET, POST]
